<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi Phục Mật Khẩu | An LUXURY</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-darker);
        }
        
        .auth-image {
            flex: 1;
            background-image: url('../images/collection-banner.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .auth-image-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.2), rgba(5,5,5,1));
        }

        .auth-form-container {
            width: 100%;
            max-width: 500px;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
            background-color: var(--bg-darker);
        }

        .auth-logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 3rem;
            display: block;
        }

        .auth-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .auth-input-group i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 1rem;
            color: var(--gold-primary);
        }

        .auth-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background-color: var(--bg-light);
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .auth-btn {
            padding: 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .auth-link {
            color: var(--gold-primary);
            text-decoration: none;
            transition: var(--transition);
        }
        
        .auth-link:hover {
            color: var(--gold-light);
            text-decoration: underline;
        }

        .back-to-home {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .back-to-home:hover {
            color: var(--gold-primary);
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .otp-alert {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-primary);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .otp-code-highlight {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold-primary);
            letter-spacing: 2px;
            display: block;
            text-align: center;
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border: 1px dashed rgba(212, 175, 55, 0.4);
        }

        @media (max-width: 768px) {
            .auth-image { display: none; }
            .auth-form-container { max-width: 100%; padding: 2rem; }
        }
    </style>
    <script>
        (function() {
            const theme = localStorage.getItem('an-luxury-theme') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <script src="../js/theme.js"></script>
</head>
<body>

    <div class="auth-container">
        <!-- Background Banner -->
        <div class="auth-image">
            <div class="auth-image-overlay"></div>
        </div>

        <!-- Form Khôi Phục -->
        <div class="auth-form-container">
            <a href="login.html" class="back-to-home"><i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Quay lại đăng nhập</a>
            
            <a href="index.html" class="auth-logo">An LUXURY</a>
            
            <h1 class="auth-title">Khôi Phục Mật Khẩu</h1>
            <p class="auth-subtitle" id="form-subtitle">Nhập email đăng ký của bạn để bắt đầu khôi phục quyền truy cập tài khoản VIP.</p>

            <!-- BƯỚC 1: NHẬP EMAIL -->
            <form id="step1Form" class="form-step active">
                <div class="auth-input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" class="auth-input" placeholder="Email đăng ký của bạn" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full auth-btn">Gửi Mã Xác Thực OTP</button>
            </form>

            <!-- BƯỚC 2: XÁC THỰC OTP & ĐẶT MẬT KHẨU MỚI -->
            <form id="step2Form" class="form-step">
                <!-- Thông báo OTP cho môi trường Local -->
                <div class="otp-alert" id="otpAlertBox">
                    <i class="fa-solid fa-circle-info" style="color: var(--gold-primary); margin-right: 5px;"></i>
                    Mã khôi phục đã được tạo! Vì đang chạy local (demo), mã OTP của bạn là:
                    <span class="otp-code-highlight" id="demoOtp">------</span>
                    <small style="color: var(--text-secondary); display:block; text-align: center;">Mã này cũng đã được in ra Server Console log.</small>
                </div>

                <div class="auth-input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="otp" class="auth-input" placeholder="Mã xác thực OTP (6 chữ số)" required maxlength="6" pattern="\d{6}">
                </div>

                <div class="auth-input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="newPassword" class="auth-input" placeholder="Mật khẩu mới của bạn" required minlength="6">
                </div>

                <div class="auth-input-group">
                    <i class="fa-solid fa-shield"></i>
                    <input type="password" id="confirmNewPassword" class="auth-input" placeholder="Nhập lại mật khẩu mới" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary btn-full auth-btn">Cập Nhật Mật Khẩu</button>
                <button type="button" id="backToStep1" class="btn btn-secondary btn-full" style="background: transparent; border: 1px solid var(--border-light); color: var(--text-secondary);">Quay lại nhập Email</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
                Nhớ mật khẩu của bạn? <a href="login.html" class="auth-link" style="font-weight: 500;">Đăng nhập ngay</a>
            </div>
            
        </div>
    </div>

    <script>
        let currentEmail = '';

        // Form Bước 1: Gửi yêu cầu OTP
        document.getElementById('step1Form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailInput = document.getElementById('email').value.trim();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang xử lý...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: emailInput })
                });

                const data = await response.json();

                if (response.ok) {
                    currentEmail = emailInput;
                    
                    document.getElementById('demoOtp').textContent = data.otpForTesting || '------';
                    
                    document.getElementById('step1Form').classList.remove('active');
                    document.getElementById('step2Form').classList.add('active');
                    
                    document.getElementById('form-subtitle').textContent = `Mã OTP đã được gửi tới email ${emailInput}. Vui lòng kiểm tra và nhập mật khẩu mới.`;
                    
                    if (window.AnLuxuryNotification) {
                        AnLuxuryNotification.toast('Yêu cầu thành công! Vui lòng nhập mã OTP để tiếp tục.', 'success');
                    } else {
                        alert('Yêu cầu thành công! Vui lòng nhập mã OTP để tiếp tục.');
                    }
                } else {
                    if (window.AnLuxuryNotification) {
                        AnLuxuryNotification.toast(data.message || 'Email không tồn tại hoặc có lỗi xảy ra.', 'error');
                    } else {
                        alert(data.message || 'Email không tồn tại hoặc có lỗi xảy ra.');
                    }
                }
            } catch (error) {
                console.error('Lỗi gửi OTP:', error);
                if (window.AnLuxuryNotification) {
                    AnLuxuryNotification.toast('Không thể kết nối đến máy chủ.', 'error');
                } else {
                    alert('Không thể kết nối đến máy chủ.');
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Gửi Mã Xác Thực OTP';
            }
        });

        // Form Bước 2: Xác nhận OTP & Đặt mật khẩu mới
        document.getElementById('step2Form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmNewPassword) {
                if (window.AnLuxuryNotification) {
                    AnLuxuryNotification.toast('Mật khẩu nhập lại không khớp!', 'error');
                } else {
                    alert('Mật khẩu nhập lại không khớp!');
                }
                return;
            }

            if (newPassword.length < 6) {
                if (window.AnLuxuryNotification) {
                    AnLuxuryNotification.toast('Mật khẩu phải từ 6 ký tự trở lên!', 'warning');
                } else {
                    alert('Mật khẩu phải từ 6 ký tự trở lên!');
                }
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang khôi phục...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp,
                        password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    if (window.AnLuxuryNotification) {
                        await AnLuxuryNotification.alert('Mật khẩu của bạn đã được đặt lại thành công!', 'Khôi Phục Mật Khẩu', 'success');
                    } else {
                        alert('Mật khẩu của bạn đã được đặt lại thành công! Bạn sẽ được chuyển hướng tới trang Đăng nhập.');
                    }
                    window.location.href = 'login.html';
                } else {
                    if (window.AnLuxuryNotification) {
                        AnLuxuryNotification.toast(data.message || 'Mã xác thực OTP không chính xác hoặc đã hết hạn.', 'error');
                    } else {
                        alert(data.message || 'Mã xác thực OTP không chính xác hoặc đã hết hạn.');
                    }
                }
            } catch (error) {
                console.error('Lỗi đặt lại mật khẩu:', error);
                if (window.AnLuxuryNotification) {
                    AnLuxuryNotification.toast('Không thể kết nối đến máy chủ.', 'error');
                } else {
                    alert('Không thể kết nối đến máy chủ.');
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Cập Nhật Mật Khẩu';
            }
        });

        // Nút quay lại Bước 1
        document.getElementById('backToStep1').addEventListener('click', () => {
            document.getElementById('step2Form').classList.remove('active');
            document.getElementById('step1Form').classList.add('active');
            document.getElementById('form-subtitle').textContent = 'Nhập email đăng ký của bạn để bắt đầu khôi phục quyền truy cập tài khoản VIP.';
        });
    </script>
</body>
</html>
