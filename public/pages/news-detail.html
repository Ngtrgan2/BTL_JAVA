<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Tin Tức | An LUXURY</title>
    <meta name="description" content="Cập nhật tin tức mới nhất về trang sức kim cương, xu hướng thiết kế và các sự kiện nổi bật từ An LUXURY.">
    <meta name="keywords" content="tin tức trang sức, xu hướng kim cương, sự kiện An LUXURY, kiến thức trang sức">
    <meta name="author" content="An LUXURY Editorial">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="Tin Tức Trang Sức Kim Cương | An LUXURY">
    <meta property="og:description" content="Cập nhật tin tức và xu hướng trang sức kim cương mới nhất từ An LUXURY.">
    
    <!-- Schema Markup Article -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "Tin Tức An LUXURY",
      "author": {
        "@type": "Organization",
        "name": "An LUXURY Editorial"
      },
      "publisher": {
        "@type": "Organization",
        "name": "An LUXURY",
        "logo": {
          "@type": "ImageObject",
          "url": "https://anluxury.com.vn/images/about-store.png"
        }
      }
    }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .footer-brand-outline {
            font-size: 9.5vw;
            font-family: var(--font-heading);
            color: transparent;
            -webkit-text-stroke: 1px rgba(212, 175, 55, 0.2);
            text-transform: uppercase;
            line-height: 1;
            margin-top: 1rem;
            user-select: none;
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
            transition: all 0.5s ease;
        }

        .footer-brand-outline:hover {
            -webkit-text-stroke: 1px rgba(212, 175, 55, 0.5);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }
    </style>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const newsId = params.get('id');

            try {
                const newsList = await window.API.getNews();
                const article = newsList.find(n => n._id === newsId || n.id == newsId);

                if (article) {
                    document.getElementById('page-title').textContent = `${article.title} | An LUXURY`;
                    document.getElementById('news-content').innerHTML = `
                        <div class="news-detail-header">
                            <span class="news-detail-category">${article.category || 'Tin tức'}</span>
                            <h1 class="news-detail-title">${article.title}</h1>
                            <div class="news-detail-meta">
                                <span><i class="fa-regular fa-calendar-days" style="margin-right: 8px;"></i> ${new Date(article.createdAt || Date.now()).toLocaleDateString('vi-VN')}</span>
                                <span><i class="fa-regular fa-user" style="margin-right: 8px;"></i> Bởi ${article.source || 'An LUXURY Editorial'}</span>
                            </div>
                        </div>
                        <div class="news-detail-img-wrap">
                            <img src="${article.image || '../images/blog-thumb.jpg'}" alt="${article.title}" class="news-detail-img">
                        </div>
                        <div class="news-detail-body">${article.summary || article.content || ''}</div>
                    `;
                } else {
                    document.getElementById('news-content').innerHTML = `<div style="text-align: center; padding: 5rem;"><h2>Không tìm thấy bài viết</h2><a href="index.html" class="btn btn-liquid">Quay lại</a></div>`;
                }
            } catch (error) {
                console.error("Lỗi lấy dữ liệu tin tức:", error);
                document.getElementById('news-content').innerHTML = `<div style="text-align: center; padding: 5rem;"><h2>Lỗi tải dữ liệu</h2><p>${error.message}</p></div>`;
            }

            // Floating Navigation Logic (same behavior as homepage)
            const header = document.getElementById('header');
            let lastScrollY = window.scrollY;
            let scrollPositionOnCollapse = 0;
            const EXPAND_SCROLL_THRESHOLD = 80;

            window.addEventListener('scroll', () => {
                const currentScrollY = window.scrollY;

                // Collapse when scrolling down past 150px
                if (!header.classList.contains('collapsed') && currentScrollY > lastScrollY && currentScrollY > 150) {
                    header.classList.add('collapsed');
                    scrollPositionOnCollapse = currentScrollY;
                }
                // Expand when scrolling up by more than the threshold
                else if (header.classList.contains('collapsed') && currentScrollY < lastScrollY && (scrollPositionOnCollapse - currentScrollY > EXPAND_SCROLL_THRESHOLD)) {
                    header.classList.remove('collapsed');
                }

                // Always expand at the very top
                if (currentScrollY < 10) {
                    header.classList.remove('collapsed');
                }

                lastScrollY = currentScrollY;
            });

            // Expand on click if collapsed
            header.addEventListener('click', (e) => {
                if (header.classList.contains('collapsed')) {
                    header.classList.remove('collapsed');
                    e.stopPropagation();
                }
            });

            // Location Map Logic (same behavior as homepage)
            const mapWrapper = document.getElementById('map-wrapper');
            const mapCard = document.getElementById('map-card');

            if (mapWrapper && mapCard) {
                mapWrapper.addEventListener('mousemove', (e) => {
                    const rect = mapCard.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;

                    const rotateX = -y / 10;
                    const rotateY = x / 10;

                    mapCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });

                mapWrapper.addEventListener('mouseleave', () => {
                    mapCard.style.transform = 'rotateX(0deg) rotateY(0deg)';
                });

                mapWrapper.addEventListener('click', () => {
                    if (mapCard.classList.contains('expanded')) {
                        // Second click: Redirect to Google Maps
                        window.open('https://www.google.com/maps/search/?api=1&query=33+Bạch+Đằng,+Hồng+Hà,+Hà+Nội', '_blank');
                    } else {
                        // First click: Expand
                        mapCard.classList.add('expanded');
                        const hint = mapWrapper.querySelector('.click-hint');
                        if (hint) {
                            hint.textContent = 'Click again to open in Google Maps';
                            hint.style.color = 'var(--gold-primary)';
                        }
                    }
                });

                // Close map when clicking outside
                document.addEventListener('click', (e) => {
                    if (!mapWrapper.contains(e.target) && mapCard.classList.contains('expanded')) {
                        mapCard.classList.remove('expanded');
                        const hint = mapWrapper.querySelector('.click-hint');
                        if (hint) {
                            hint.textContent = 'Click to expand';
                            hint.style.color = 'var(--text-muted)';
                        }
                    }
                });
            }
        });
    </script>
<script src="../js/toast.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/chat-widget.js?v=3"></script>
</body>
</html>
